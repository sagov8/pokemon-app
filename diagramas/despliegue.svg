@startuml
skinparam shadowing false
title Diagrama de despliegue - PokemonApp

actor "Usuario / Jugador" as Usuario

node "«dispositivo» Equipo del usuario" as PC {
  node "«execution environment» Terminal / Consola" as Terminal {
    artifact "Entrada por teclado\nSalida por pantalla" as IO
  }

  node "«execution environment» JVM / JRE" as JVM {
    artifact "«artifact» PokemonApp\nClases compiladas Java" as App
  }

  node "«device» Sistema de archivos local" as FS {
    artifact "«artifact» saves/partida.txt\nPartida guardada" as SaveFile
  }
}

Usuario - -> Terminal : usa
Terminal - -> App : ejecuta Main.main()
App - -> Terminal : System.in / System.out
App - -> SaveFile : GameRepository lee/escribe
@enduml

